<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zernio DG Carousels</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Zernio DG Carousels</h1>
        <div class="carousel-container">
            <div class="carousel">
                <div class="slide active">
                    <h2>Slide 1</h2>
                    <p>Welcome to Zernio DG Carousels</p>
                </div>
                <div class="slide">
                    <h2>Slide 2</h2>
                    <p>Interactive carousel components</p>
                </div>
                <div class="slide">
                    <h2>Slide 3</h2>
                    <p>Modern web development</p>
                </div>
            </div>
            <div class="carousel-controls">
                <button id="prevBtn">← Previous</button>
                <button id="nextBtn">Next →</button>
            </div>
        </div>
    </div>
    <script src="src/index.js"></script>
</body>
</html>
